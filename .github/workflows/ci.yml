name: TechMart CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: techmart
          POSTGRES_PASSWORD: techmart_secret
          POSTGRES_DB: techmart_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: techmart-backend/package-lock.json

      - name: Install backend dependencies
        working-directory: techmart-backend
        run: npm ci

      - name: Run migrations
        working-directory: techmart-backend
        env:
          DATABASE_URL: postgres://techmart:techmart_secret@localhost:5432/techmart_test
        run: |
          for f in migrations/*.sql; do
            psql $DATABASE_URL -f "$f" || true
          done

      - name: Run tests
        working-directory: techmart-backend
        env:
          DATABASE_URL: postgres://techmart:techmart_secret@localhost:5432/techmart_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_key_for_ci
          JWT_REFRESH_SECRET: test_refresh_secret_key_for_ci
          NODE_ENV: test
        run: npm test

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: techmart-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: techmart-frontend
        run: npm ci

      - name: Build frontend
        working-directory: techmart-frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:5000/api' }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: techmart-frontend/dist/

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: docker build -t techmart-backend:latest ./techmart-backend

      - name: Build frontend Docker image
        run: docker build -t techmart-frontend:latest ./techmart-frontend
